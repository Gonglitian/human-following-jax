hunav_loader:
  ros__parameters:
    simulator: Gazebo Classic
    yaml_base_name: agents_sharp_turn
    map: sharp_turn
    publish_people: true

    # Target walks along an L-shaped path: west-to-centre then sharp 90 deg
    # north. Tests whether the CV predictor + policy can handle a sudden
    # heading change.
    global_goals:
      1: {x:  0.0, y:  0.0}   # inside corner
      2: {x:  0.0, y:  8.0}   # end of N leg
      3: {x: -8.0, y:  0.0}   # end of W leg

    agents:
      - target

    target:
      id: 1
      group_id: -1
      skin: 0
      max_vel: 0.9
      radius: 0.35
      goal_radius: 0.3
      cyclic_goals: true
      init_pose: {x: -7.5, y: 0.0, z: 1.25, h: 0.0}
      behavior:
        type: Regular
        configuration: 0
        goal_force_factor: 2.0
        obstacle_force_factor: 10.0
        social_force_factor: 5.0
        other_force_factor: 20.0
      goals:
        - 1
        - 2
        - 3
