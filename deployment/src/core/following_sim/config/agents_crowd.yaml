hunav_loader:
  ros__parameters:
    simulator: Gazebo Classic
    yaml_base_name: agents_crowd
    map: crowd
    publish_people: true

    # Crowded hall: target weaves through the pillars while 10 bystanders
    # walk random routes. Tests collision avoidance + target-keeping under
    # social interference.
    global_goals:
      1: {x:  8.0, y:  8.0}
      2: {x: -8.0, y:  8.0}
      3: {x: -8.0, y: -8.0}
      4: {x:  8.0, y: -8.0}
      5: {x:  0.0, y:  8.0}
      6: {x:  0.0, y: -8.0}
      7: {x:  8.0, y:  0.0}
      8: {x: -8.0, y:  0.0}

    agents:
      - target
      - b1
      - b2
      - b3
      - b4
      - b5
      - b6
      - b7
      - b8
      - b9
      - b10

    target:
      id: 1
      group_id: -1
      skin: 0
      max_vel: 0.9
      radius: 0.35
      goal_radius: 0.3
      cyclic_goals: true
      init_pose: {x: -7.0, y: -7.0, z: 1.25, h: 0.78}
      behavior:
        type: Regular
        configuration: 0
        goal_force_factor: 2.0
        obstacle_force_factor: 10.0
        social_force_factor: 5.0
        other_force_factor: 20.0
      goals: [1, 3]

    b1: { id: 2, group_id: -1, skin: 1, max_vel: 1.0, radius: 0.35, goal_radius: 0.3, cyclic_goals: true,
          init_pose: {x:  7.0, y:  7.0, z: 1.25, h: 3.14},
          behavior: {type: Regular, configuration: 0, goal_force_factor: 2.0, obstacle_force_factor: 10.0, social_force_factor: 5.0, other_force_factor: 20.0},
          goals: [3, 1] }
