hunav_loader:
  ros__parameters:
    simulator: Gazebo Classic
    yaml_base_name: agents_occlusion
    map: occlusion
    publish_people: true

    # Target walks straight through a corridor whose centre line is blocked
    # by three off-axis obstructions. LOS to target is broken several times;
    # decider must stay on target using UWB pseudo-detection + CV prediction.
    global_goals:
      1: {x:  8.0, y: 0.0}
      2: {x: -8.0, y: 0.0}

    agents:
      - target

    target:
      id: 1
      group_id: -1
      skin: 0
      max_vel: 0.9
      radius: 0.35
      goal_radius: 0.3
      cyclic_goals: true
      init_pose: {x: -7.5, y: 0.0, z: 1.25, h: 0.0}
      behavior:
        type: Regular
        configuration: 0
        goal_force_factor: 2.0
        obstacle_force_factor: 10.0
        social_force_factor: 5.0
        other_force_factor: 20.0
      goals:
        - 1
        - 2
