          goals: [2, 1] }
    b3: { id: 4, group_id: -1, skin: 4, max_vel: 0.4, radius: 0.35, goal_radius: 0.3, cyclic_goals: true,
          init_pose: {x: -3.00, y: 2.00, z: 1.25, h: 0.0000},
          behavior: {type: Regular, configuration: 0, goal_force_factor: 2.0, obstacle_force_factor: 10.0, social_force_factor: 5.0, other_force_factor: 20.0},
          goals: [1, 2] }
