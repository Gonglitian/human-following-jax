hunav_loader:
  ros__parameters:
    simulator: Gazebo Classic
    yaml_base_name: agents_house
    map: house
    publish_people: true

    global_goals:
      1: {x: -8.00, y: 0.00}
      2: {x: 7.00, y: 0.00}

    agents:
      - target
      - b1
      - b2
      - b3

    target:
      id: 1
      group_id: -1
      skin: 0
      max_vel: 0.4
      radius: 0.35
      goal_radius: 0.3
      cyclic_goals: true
      init_pose: {x: -5.00, y: 0.00, z: 1.25, h: 0.0000}
      behavior:
        type: Regular
        configuration: 0
        goal_force_factor: 2.0
        obstacle_force_factor: 10.0
        social_force_factor: 5.0
        other_force_factor: 20.0
      goals: [2, 1]

    b1: { id: 2, group_id: -1, skin: 2, max_vel: 0.4, radius: 0.35, goal_radius: 0.3, cyclic_goals: true,
          init_pose: {x: 0.00, y: -2.00, z: 1.25, h: 1.5708},
