hunav_loader:
  ros__parameters:
    map: warehouse
    publish_people: true

    # AWS RoboMaker small warehouse: ~11 m (x: -5.8 .. 5.5) x ~18 m (y: -8.7 .. 9.6).
    # Foxy hunav_loader needs per-agent inline goals; goal IDs are strings.
    # g1=SW(-3,-7.5), g2=NW(-3,6), g3=NE(2,6), g4=SE(2,-6).

    agents:
      - target
      - b1
      - b2
      - b3
      - b4
      - b5
      - b6
      - b7
      - b8

    # target walks the full length of the warehouse in a loop.
    target:
      id: 1
      skin: 0
      behavior: 1
      group_id: -1
      max_vel: 0.4
      radius: 0.35
      goal_radius: 0.3
      cyclic_goals: true
      init_pose: {x: -3.0, y: -5.0, z: 1.25, h: 1.5708}
      goals: [g2, g1]
      g1: {x: -3.0, y: -7.5, h: 0.0}
      g2: {x: -3.0, y:  6.0, h: 0.0}

    b1:
      id: 2
      skin: 1
      behavior: 1
      group_id: -1
      max_vel: 0.4
      radius: 0.35
      goal_radius: 0.3
      cyclic_goals: true
      init_pose: {x: -3.0, y: 5.5, z: 1.25, h: -1.5708}
      goals: [g1, g2]
      g1: {x: -3.0, y: -7.5, h: 0.0}
      g2: {x: -3.0, y:  6.0, h: 0.0}

    b2:
      id: 3
      skin: 2
      behavior: 1
      group_id: -1
      max_vel: 0.4
      radius: 0.35
      goal_radius: 0.3
      cyclic_goals: true
      init_pose: {x: -3.0, y: 2.0, z: 1.25, h: -1.5708}
      goals: [g1, g2]
      g1: {x: -3.0, y: -7.5, h: 0.0}
      g2: {x: -3.0, y:  6.0, h: 0.0}

    b3:
      id: 4
      skin: 3
      behavior: 1
      group_id: -1
      max_vel: 0.4
      radius: 0.35
      goal_radius: 0.3
      cyclic_goals: true
      init_pose: {x: 2.0, y: 5.5, z: 1.25, h: -1.5708}
      goals: [g4, g3]
      g3: {x:  2.0, y:  6.0, h: 0.0}
      g4: {x:  2.0, y: -6.0, h: 0.0}

    b4:
      id: 5
      skin: 4
      behavior: 1
      group_id: -1
      max_vel: 0.4
      radius: 0.35
      goal_radius: 0.3
      cyclic_goals: true
