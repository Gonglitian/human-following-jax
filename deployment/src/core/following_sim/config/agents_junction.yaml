hunav_loader:
  ros__parameters:
    simulator: Gazebo Classic
    yaml_base_name: agents_junction
    map: junction
    publish_people: true

    # Target walks across a T-junction, one bystander crosses perpendicular.
    global_goals:
      1: {x:  0.0, y:  8.0}   # north end
      2: {x:  8.0, y:  0.0}   # east end
      3: {x: -8.0, y:  0.0}   # west end

    agents:
      - target
      - bystander_1

    target:
      id: 1
      group_id: -1
      skin: 0
      max_vel: 0.9
      radius: 0.35
      goal_radius: 0.3
      cyclic_goals: true
      init_pose: {x: -7.5, y: 0.0, z: 1.25, h: 0.0}
      behavior:
        type: Regular
        configuration: 0
        goal_force_factor: 2.0
        obstacle_force_factor: 10.0
        social_force_factor: 5.0
        other_force_factor: 20.0
      goals:
        - 2
        - 1
        - 3

    bystander_1:
      id: 2
      group_id: -1
      skin: 1
      max_vel: 1.0
      radius: 0.35
      goal_radius: 0.3
      cyclic_goals: true
      init_pose: {x: 0.0, y: 7.5, z: 1.25, h: -1.5708}
      behavior:
        type: Regular
        configuration: 0
        goal_force_factor: 2.0
        obstacle_force_factor: 10.0
        social_force_factor: 5.0
        other_force_factor: 20.0
      goals:
        - 1
        - 2
